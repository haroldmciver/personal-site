  <script>
    document.querySelectorAll(".gallery-row").forEach(function (row) {
      var img = row.querySelector("img");
      if (!img) return;
      var titleEl = row.querySelector(".gallery-row__title");
      var dateEl = row.querySelector(".gallery-row__date");
      if (titleEl) titleEl.textContent = img.getAttribute("title") || "";
      if (dateEl) {
        var d = img.getAttribute("data-date");
        if (d) dateEl.textContent = d;
        else dateEl.parentNode.removeChild(dateEl);
      }
    });
  </script>
